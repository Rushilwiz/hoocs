name: Deploy HooCS Hub 

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Sync to Local Nginx
    runs-on: self-hosted

    steps:
    - name: Deploy and Reload
      run: |
        git config --add safe.directory /sites/hoocs.science
        cd /sites/hoocs.science
        git pull origin master
        sudo systemctl reload nginx

